<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  :root {
    --bg: #0e0d0a;
    --bg-grad: radial-gradient(ellipse at top, #1a1612 0%, #0e0d0a 50%);
    --card: #181612; --card-up: #221e18;
    --border: #2a2620; --border-strong: #3a3428;
    --text: #f3eed8; --text-mid: #a39d8a; --text-dim: #6b6655;
    --accent: #e8a857; --accent-soft: rgba(232, 168, 87, 0.12);
    --rest: #6e9c8f; --rest-soft: rgba(110, 156, 143, 0.12);
    --danger: #c97064;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', system-ui, sans-serif;
    color: var(--text);
    background: var(--bg-grad); background-color: var(--bg); background-attachment: fixed;
    min-height: 100vh; min-height: 100dvh;
    padding-top: env(safe-area-inset-top, 0);
    -webkit-font-smoothing: antialiased; overscroll-behavior-y: none;
  }
  .font-display { font-family: 'Iowan Old Style', Georgia, 'Times New Roman', serif; letter-spacing: -0.02em; font-weight: 600; }
  .font-mono { font-family: ui-monospace, 'SF Mono', Menlo, Monaco, monospace; font-feature-settings: "tnum"; }
  input, textarea {
    background: transparent; border: none; color: var(--text);
    font-family: inherit; outline: none; width: 100%; font-size: 16px;
  }
  button { font-family: inherit; cursor: pointer; }
  ::placeholder { color: var(--text-dim); opacity: 1; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { display: none; }
  .tap { transition: transform 0.1s ease, opacity 0.15s ease; }
  .tap:active { transform: scale(0.97); opacity: 0.85; }
  .fade-in { animation: fadeIn 0.25s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .phone-frame {
    max-width: 430px; margin: 0 auto;
    min-height: 100vh; min-height: 100dvh;
    padding: 0 0 88px 0; position: relative;
  }
  .nav-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 8px 0 4px; color: var(--text-dim);
    background: transparent; border: none; transition: color 0.15s;
  }
  .nav-tab.active { color: var(--accent); }
  .nav-tab .label { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; }
</style>
</head>
